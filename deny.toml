[advisories]
version = 2
yanked = "warn"
ignore = []

[licenses]
allow = [
    "Apache-2.0",
    "MIT",
    "Unicode-3.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Unpublished workspace-internal path dependencies (e.g. the test-fixtures
# crate) have no version requirement by design.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
